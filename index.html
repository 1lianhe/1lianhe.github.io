<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国共产主义青年交流会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", SimHei, sans-serif;
            background-color: #ffffff;
        }

        /* 顶部深红导航栏 */
        .top-bar {
            background-color: #9E090F;
            width: 100%;
            padding: 22px 35px;
            display: flex;
            align-items: center;
        }

        .party-logo {
            font-size: 36px;
            color: #FFFFFF;
            margin-right: 12px;
        }

        .site-title {
            font-size: 26px;
            font-weight: bold;
            color: #FFFFFF;
            letter-spacing: 1px;
        }

        /* 导航菜单 */
        .nav {
            background-color: #ffffff;
            padding: 18px 35px;
            display: flex;
            gap: 35px;
            border-bottom: 2px solid #9E090F;
        }

        .nav a {
            text-decoration: none;
            font-size: 17px;
            color: #333;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav a:hover {
            color: #fff;
            background-color: #9E090F;
        }

        /* 内容通用样式 */
        .content {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
            display: none;
        }

        /* 默认显示主页 */
        #home {
            display: block;
        }

        /* 搜索框 */
        .search-box {
            width: 70%;
            max-width: 600px;
            padding: 14px 25px;
            font-size: 16px;
            border: 2px solid #9E090F;
            border-radius: 30px;
            outline: none;
            text-align: center;
            margin-bottom: 50px;
        }

        /* 欢迎文字 */
        .welcome-text {
            font-size: 20px;
            color: #333;
            line-height: 1.8;
        }

        .welcome-text strong {
            color: #9E090F;
            font-size: 22px;
        }

        /* 文章栏目 3x3 网格 */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 40px;
        }

        /* 竖起来的圆角卡片 */
        .article-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            font-size: 18px;
            color: #333;
            transition: 0.3s;
            height: 320px; /* 竖长方形 */
            display: flex;
            flex-direction: column;
        }

        /* 头像区：上 3/5 */
        .card-img {
            height: 60%;
            background-size: cover;
            background-position: center;
        }

        /* 文字区：下 2/5 深红底+白字 */
        .card-text {
            height: 40%;
            background-color: #9E090F;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(158, 9, 15, 0.15);
        }

        /* 其他栏目文字 */
        .other-text {
            font-size: 24px;
            color: #9E090F;
            font-weight: bold;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar">
    <div class="party-logo">☭</div>
    <div class="site-title">中国共产主义青年交流会</div>
</div>

<!-- 导航菜单 -->
<div class="nav">
    <a onclick="showHome()">主页</a>
    <a onclick="showYun()">国际共运</a>
    <a onclick="showArticle()">文章</a>
    <a onclick="showHistory()">历史</a>
    <a onclick="showArt()">文艺</a>
    <a onclick="showOther()">其他</a>
</div>

<!-- 主页内容 -->
<div id="home" class="content">
    <input type="text" class="search-box" placeholder="输入关键词搜索本站内容">
    <div class="welcome-text">
        <strong>热烈欢迎各位青年同志加入中国共产主义青年交流会！</strong><br>
        在这里，我们共同学习理论、传承红色精神、交流思想、增进友谊。<br>
        愿我们以青春之名，担时代之责，不忘初心，砥砺前行！
    </div>
</div>

<!-- 文章栏目：3x3 全部填好 -->
<div id="article" class="content">
    <h2 style="color:#9E090F;margin-bottom:20px;">文章合集</h2>
    <div class="article-grid">

        <!-- 1 马克思 -->
        <div class="article-card">
            <div class="card-img" style="background-image:url('https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fpic.jianke.com%2Fupload%2Fimage%2F20200520%2F20200520158995816838134719.jpg&refer=http%3A%2F%2Fpic.jianke.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto')"></div>
            <div class="card-text">马克思</div>
        </div>

        <!-- 2 恩格斯 -->
        <div class="article-card">
            <div class="card-img" style="background-image:url('https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fpic.jianke.com%2Fupload%2Fimage%2F20200520%2F20200520158995823296552245.jpg&refer=http%3A%2F%2Fpic.jianke.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto')"></div>
            <div class="card-text">恩格斯</div>
        </div>

        <!-- 3 列宁 -->
        <div class="article-card">
            <div class="card-img" style="background-image:url('https://gimg2.baidu.com/image_search/src=http%3A%2F%2F5b0988e595225.cdn.sohucs.com%2Fimages%2F20190715%2F0a6f3f8b745e40779f59595f1b462b5.jpeg&refer=http%3A%2F%2F5b0988e595225.cdn.sohucs.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto')"></div>
            <div class="card-text">列宁</div>
        </div>

        <!-- 4 毛泽东 -->
        <div class="article-card">
            <div class="card-img" style="background-image:url('https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fimg.mp.itc.cn%2Fupload%2F20170503%2F97f334080a234334904022783fa9335_th.jpeg&refer=http%3A%2F%2Fimg.mp.itc.cn&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto')"></div>
            <div class="card-text">毛泽东</div>
        </div>

        <!-- 5 斯大林 -->
        <div class="article-card">
            <div class="card-img" style="background-image:url('https://gimg2.baidu.com/image_search/src=http%3A%2F%2Fp.qqan.com%2Fup%2Fallimg%2F150324%2F1-150324192140-L.jpg&refer=http%3A%2F%2Fp.qqan.com&app=2002&size=f9999,10000&q=a80&n=0&g=0n&fmt=auto')"></div>
            <div class="card-text">斯大林</div>
        </div>

        <!-- 6 个人文章（无头像，纯色） -->
        <div class="article-card">
            <div class="card-img" style="background-color:#eee;display:flex;align-items:center;justify-content:center;color:#666;font-size:18px;">个人文章</div>
            <div class="card-text">个人文章</div>
        </div>

        <!-- 7 其他 -->
        <div class="article-card">
            <div class="card-img" style="background-color:#eee;display:flex;align-items:center;justify-content:center;color:#666;font-size:18px;">其他</div>
            <div class="card-text">其他</div>
        </div>

        <!-- 8 预留 -->
        <div class="article-card">
            <div class="card-img" style="background-color:#f5f5f5;"></div>
            <div class="card-text">预留</div>
        </div>

        <!-- 9 预留 -->
        <div class="article-card">
            <div class="card-img" style="background-color:#f5f5f5;"></div>
            <div class="card-text">预留</div>
        </div>

    </div>
</div>

<!-- 国际共运 -->
<div id="yun" class="content">
    <div class="welcome-text">国际共运板块，后续添加内容</div>
</div>

<!-- 历史 -->
<div id="history" class="content">
    <div class="welcome-text">历史板块，后续添加内容</div>
</div>

<!-- 文艺 -->
<div id="art" class="content">
    <div class="welcome-text">文艺板块，后续添加内容</div>
</div>

<!-- 其他栏目 -->
<div id="other" class="content">
    <div class="other-text">哈哈哈</div>
</div>

<script>
// 切换栏目
function showHome(){
    hideAll();
    document.getElementById("home").style.display = "block";
}
function showYun(){
    hideAll();
    document.getElementById("yun").style.display = "block";
}
function showArticle(){
    hideAll();
    document.getElementById("article").style.display = "block";
}
function showHistory(){
    hideAll();
    document.getElementById("history").style.display = "block";
}
function showArt(){
    hideAll();
    document.getElementById("art").style.display = "block";
}
function showOther(){
    hideAll();
    document.getElementById("other").style.display = "block";
}
// 隐藏所有栏目
function hideAll(){
    document.querySelectorAll(".content").forEach(item=>{
        item.style.display = "none";
    });
}
</script>

</body>
</html>
