<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国共产主义青年交流会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", SimHei, sans-serif;
            background-color: #ffffff;
        }

        /* 顶部深红导航栏 */
        .top-bar {
            background-color: #9E090F;
            width: 100%;
            padding: 22px 35px;
            display: flex;
            align-items: center;
        }

        .party-logo {
            font-size: 36px;
            color: #FFFFFF;
            margin-right: 12px;
        }

        .site-title {
            font-size: 26px;
            font-weight: bold;
            color: #FFFFFF;
            letter-spacing: 1px;
        }

        /* 导航菜单 */
        .nav {
            background-color: #ffffff;
            padding: 18px 35px;
            display: flex;
            gap: 35px;
            border-bottom: 2px solid #9E090F;
        }

        .nav a {
            text-decoration: none;
            font-size: 17px;
            color: #333;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav a:hover {
            color: #fff;
            background-color: #9E090F;
        }

        /* 内容通用样式 */
        .content {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
            display: none;
        }

        /* 默认显示主页 */
        #home {
            display: block;
        }

        /* 搜索框 */
        .search-box {
            width: 70%;
            max-width: 600px;
            padding: 14px 25px;
            font-size: 16px;
            border: 2px solid #9E090F;
            border-radius: 30px;
            outline: none;
            text-align: center;
            margin-bottom: 50px;
        }

        /* 欢迎文字 */
        .welcome-text {
            font-size: 20px;
            color: #333;
            line-height: 1.8;
        }

        .welcome-text strong {
            color: #9E090F;
            font-size: 22px;
        }

        /* 文章栏目 3x3 网格 */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 40px;
        }

        /* 圆润长方形卡片 */
        .article-card {
            background: #f8f8f8;
            padding: 30px 15px;
            border-radius: 16px;
            border: 1px solid #eee;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            font-size: 18px;
            color: #333;
            transition: 0.3s;
            height: 320px; /* 竖起来 */
            display: flex;
            flex-direction: column;
        }

        /* 第一个卡片：列宁专用样式 */
        .article-card.first {
            background: #fff;
            padding: 0;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* 上五分之三：头像区域 */
        .lenin-top {
            height: 60%;
            background-image: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxISEhUTEhIVFRUVGBoYFRkWFh0XGBoYHSggGBolGx4yLi4uFx8zODMsNygtLisBCgoKDg0OGhAQGi0lHyUtLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLS0tLf/AABEIALcBEwMBEQACEQEDEQH/xAAcAAABBQEBAQAAAAAAAAAAAAADAAECBAUGBwj/xAA5EAABAwQCAQQCBQkEAwAAAAABAAhEDIQQMQQVBUWEyJhcYEjQpEUFTJzKBobE1JDRCwdHh8PEzJEP/xAAYAQADAQEAAAAAAAAAAAAAAAADAgAE/8QAIxEAAgICAQQCAwAAAAAAAAAAABAhEDIQQSMQVBUWEyJhcZEjQp/aAAwDAQACEQMRAD8A9xIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIiIi//Z');
            background-size: cover;
            background-position: center;
        }

        /* 下五分之二：深红底白字 列宁 */
        .lenin-bottom {
            height: 40%;
            background-color: #9E090F;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(158, 9, 15, 0.15);
        }

        /* 其他栏目文字 */
        .other-text {
            font-size: 24px;
            color: #9E090F;
            font-weight: bold;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar">
    <div class="party-logo">☭</div>
    <div class="site-title">中国共产主义青年交流会</div>
</div>

<!-- 导航菜单 -->
<div class="nav">
    <a onclick="showHome()">主页</a>
    <a onclick="showYun()">国际共运</a>
    <a onclick="showArticle()">文章</a>
    <a onclick="showHistory()">历史</a>
    <a onclick="showArt()">文艺</a>
    <a onclick="showOther()">其他</a>
</div>

<!-- 主页内容 -->
<div id="home" class="content">
    <input type="text" class="search-box" placeholder="输入关键词搜索本站内容">
    <div class="welcome-text">
        <strong>热烈欢迎各位青年同志加入中国共产主义青年交流会！</strong><br>
        在这里，我们共同学习理论、传承红色精神、交流思想、增进友谊。<br>
        愿我们以青春之名，担时代之责，不忘初心，砥砺前行！
    </div>
</div>

<!-- 文章栏目：3x3 第一个卡片改为列宁 -->
<div id="article" class="content">
    <h2 style="color:#9E090F;margin-bottom:20px;">文章合集</h2>
    <div class="article-grid">
        <div class="article-card first">
            <div class="lenin-top"></div>
            <div class="lenin-bottom">列宁</div>
        </div>
        <div class="article-card">待添加文章</div>
        <div class="article-card">待添加文章</div>
        <div class="article-card">待添加文章</div>
        <div class="article-card">待添加文章</div>
        <div class="article-card">待添加文章</div>
        <div class="article-card">待添加文章</div>
        <div class="article-card">待添加文章</div>
        <div class="article-card">待添加文章</div>
    </div>
</div>

<!-- 国际共运 -->
<div id="yun" class="content">
    <div class="welcome-text">国际共运板块，后续添加内容</div>
</div>

<!-- 历史 -->
<div id="history" class="content">
    <div class="welcome-text">历史板块，后续添加内容</div>
</div>

<!-- 文艺 -->
<div id="art" class="content">
    <div class="welcome-text">文艺板块，后续添加内容</div>
</div>

<!-- 其他栏目 -->
<div id="other" class="content">
    <div class="other-text">哈哈哈</div>
</div>

<script>
// 切换栏目
function showHome(){
    hideAll();
    document.getElementById("home").style.display = "block";
}
function showYun(){
    hideAll();
    document.getElementById("yun").style.display = "block";
}
function showArticle(){
    hideAll();
    document.getElementById("article").style.display = "block";
}
function showHistory(){
    hideAll();
    document.getElementById("history").style.display = "block";
}
function showArt(){
    hideAll();
    document.getElementById("art").style.display = "block";
}
function showOther(){
    hideAll();
    document.getElementById("other").style.display = "block";
}
// 隐藏所有栏目
function hideAll(){
    document.querySelectorAll(".content").forEach(item=>{
        item.style.display = "none";
    });
}
</script>

</body>
</html>
