<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国共产主义青年交流会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", SimHei, sans-serif;
            background-color: #ffffff;
        }

        .top-bar {
            background-color: #9E090F;
            width: 100%;
            padding: 22px 35px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .party-logo {
            font-size: 36px;
            color: #FFFFFF;
        }

        .site-title {
            font-size: 26px;
            font-weight: bold;
            color: #FFFFFF;
            letter-spacing: 1px;
        }

        .nav {
            background-color: #ffffff;
            padding: 18px 35px;
            display: flex;
            gap: 35px;
            border-bottom: 2px solid #9E090F;
        }

        .nav a {
            text-decoration: none;
            font-size: 17px;
            color: #333;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav a:hover {
            color: #fff;
            background-color: #9E090F;
        }

        .content {
            max-width: 1000px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: center;
        }

        .search-box {
            width: 70%;
            max-width: 600px;
            padding: 14px 25px;
            font-size: 16px;
            border: 2px solid #9E090F;
            border-radius: 30px;
            outline: none;
            text-align: center;
            margin-bottom: 50px;
        }

        .welcome-text {
            font-size: 20px;
            color: #333;
            line-height: 1.8;
        }

        .other-text {
            font-size: 24px;
            color: #9E090F;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="party-logo">☭</div>
    <div class="site-title">中国共产主义青年交流会</div>
</div>

<div class="nav">
    <a onclick="showHome()">主页</a>
    <a href="#">国际共运</a>
    <a href="#">文章</a>
    <a href="#">历史</a>
    <a href="#">文艺</a>
    <a onclick="showOther()">其他</a>
</div>

<div class="content">
    <div id="home">
        <input type="text" class="search-box" placeholder="输入关键词搜索本站内容">
        <div class="welcome-text">
            <strong>热烈欢迎各位青年同志加入中国共产主义青年交流会！</strong><br>
            在这里，我们共同学习理论、传承红色精神、交流思想、增进友谊。<br>
            愿我们以青春之名，担时代之责，不忘初心，砥砺前行！
        </div>
    </div>

    <div id="other" class="other-text">
        中国共产主义青年交流会简称中共青
    </div>
</div>

<script>
function showHome() {
    document.getElementById("home").style.display = "block";
    document.getElementById("other").style.display = "none";
}

function showOther() {
    document.getElementById("home").style.display = "none";
    document.getElementById("other").style.display = "block";
}
</script>

</body>
</html>
