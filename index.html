<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际共产主义运动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体：红黑经典配色 + 居中 */
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(to bottom, #1a1a1a, #000);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* 封面容器 */
        .cover {
            max-width: 900px;
            width: 100%;
            padding: 60px 20px;
            border-top: 4px solid #d32f2f;
            border-bottom: 4px solid #d32f2f;
        }

        /* 大标题 */
        .title {
            font-size: 48px;
            font-weight: bold;
            color: #f44336;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 24px;
            color: #eee;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* 口号 / 引言 */
        .slogan {
            font-size: 20px;
            color: #ffc107;
            margin: 30px 0;
            line-height: 1.8;
            font-style: italic;
        }

        /* 时间线文字 */
        .info {
            font-size: 16px;
            color: #ccc;
            margin-top: 20px;
            line-height: 1.6;
        }

        /* 装饰线条 */
        .line {
            width: 120px;
            height: 3px;
            background: #d32f2f;
            margin: 30px auto;
        }

        /* 底部文字 */
        .footer {
            margin-top: 60px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="cover">
        <h1 class="title">国际共产主义运动</h1>
        <div class="line"></div>
        <h2 class="subtitle">全世界无产者，联合起来！</h2>

        <p class="slogan">
            为人类解放而奋斗<br>
            为真理与正义而前行
        </p>

        <div class="info">
            1848《共产党宣言》— 思想的火种<br>
            巴黎公社 · 十月革命 · 世界共运浪潮<br>
            跨越世纪的理想与斗争
        </div>

        <div class="footer">
            历史不会忘记 · 理想永不熄灭
        </div>
    </div>

</body>
</html>
