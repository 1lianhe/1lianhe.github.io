<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国际共产主义运动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体：优化渐变 + 滚动平滑 + 抗锯齿 */
        body {
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #000 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 封面容器：优化边框 + 阴影 + 圆角 + 背景层次 */
        .cover {
            max-width: 900px;
            width: 100%;
            padding: 80px 40px;
            border: 2px solid #d32f2f;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 40px rgba(211, 47, 47, 0.2), 
                        inset 0 0 20px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        /* 装饰性背景元素 */
        .cover::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(244, 67, 54, 0.05), transparent);
            z-index: 0;
        }

        /* 大标题：优化字号响应式 + 渐变文字 + 动画 */
        .title {
            font-size: clamp(36px, 6vw, 52px);
            font-weight: 700;
            background: linear-gradient(90deg, #f44336, #ff6659, #f44336);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 25px;
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
            animation: titleFloat 6s ease-in-out infinite;
        }

        /* 副标题：优化字号 + 间距 + 轻微发光 */
        .subtitle {
            font-size: clamp(20px, 3vw, 28px);
            color: #f8f8f8;
            margin-bottom: 50px;
            opacity: 0.95;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        /* 口号 / 引言：优化样式 + 边框装饰 + 内边距 */
        .slogan {
            font-size: clamp(18px, 2.5vw, 22px);
            color: #ffd700;
            margin: 40px 0;
            line-height: 2;
            font-style: italic;
            padding: 20px 30px;
            border-left: 3px solid #ffc107;
            border-right: 3px solid #ffc107;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 0 0 8px rgba(255, 193, 7, 0.3);
        }

        /* 时间线文字：优化排版 + 分段样式 */
        .info {
            font-size: clamp(15px, 2vw, 18px);
            color: #e0e0e0;
            margin-top: 30px;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 时间线关键节点高亮 */
        .info span {
            color: #f44336;
            font-weight: 600;
        }

        /* 装饰线条：优化样式 + 动画 */
        .line {
            width: clamp(100px, 15vw, 150px);
            height: 4px;
            background: linear-gradient(90deg, transparent, #d32f2f, transparent);
            margin: 40px auto;
            border-radius: 2px;
            animation: linePulse 3s ease-in-out infinite;
        }

        /* 底部文字：优化样式 + 渐变 */
        .footer {
            margin-top: 80px;
            font-size: clamp(13px, 1.8vw, 16px);
            color: #a0a0a0;
            padding-top: 20px;
            border-top: 1px solid rgba(211, 47, 47, 0.3);
            background: linear-gradient(to right, transparent, rgba(211, 47, 47, 0.1), transparent);
            padding: 15px 0;
            letter-spacing: 0.5px;
        }

        /* 动画：标题浮动 */
        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* 动画：线条脉动 */
        @keyframes linePulse {
            0%, 100% { opacity: 0.8; width: clamp(100px, 15vw, 150px); }
            50% { opacity: 1; width: clamp(120px, 18vw, 180px); }
        }

        /* 响应式优化：小屏幕适配 */
        @media (max-width: 768px) {
            .cover {
                padding: 60px 20px;
            }
            .slogan {
                padding: 15px 20px;
                border-left: 2px solid #ffc107;
                border-right: 2px solid #ffc107;
            }
            .info {
                gap: 10px;
            }
        }

        /* 元素入场动画 */
        .cover > * {
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
        }
        .title { animation-delay: 0.2s; }
        .line { animation-delay: 0.5s; }
        .subtitle { animation-delay: 0.8s; }
        .slogan { animation-delay: 1.1s; }
        .info { animation-delay: 1.4s; }
        .footer { animation-delay: 1.7s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="cover">
        <h1 class="title">国际共产主义运动</h1>
        <div class="line"></div>
        <h2 class="subtitle">全世界无产者，联合起来！</h2>

        <p class="slogan">
            为人类解放而奋斗<br>
            为真理与正义而前行
        </p>

        <div class="info">
            <span>1848年</span>《共产党宣言》— 思想的火种，照亮人类解放之路
            <span>巴黎公社</span> · 无产阶级专政的第一次伟大尝试
            <span>十月革命</span> · 第一个社会主义国家的诞生
            <span>百年浪潮</span> · 跨越世纪的理想与不屈的斗争
        </div>

        <div class="footer">
            历史不会忘记 · 理想永不熄灭 · 奋斗未有穷期
        </div>
    </div>

</body>
</html>
