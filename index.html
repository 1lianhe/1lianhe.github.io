<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国共产主义青年交流会</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", SimHei, sans-serif;
            background-color: #ffffff;
        }

        /* 顶部整条全红背景 */
        .top-bar {
            background-color: #C91F37;
            width: 100%;
            padding: 22px 35px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 党徽（镰刀锤子） */
        .party-logo {
            font-size: 36px;
            color: #FFFFFF;
        }

        /* 标题：白色 */
        .site-title {
            font-size: 26px;
            font-weight: bold;
            color: #FFFFFF;
            letter-spacing: 1px;
        }

        /* 导航栏 — 圆润优化版 */
        .nav {
            background-color: #ffffff;
            padding: 18px 35px;
            display: flex;
            gap: 35px;
            border-bottom: 2px solid #C91F37;
        }

        /* 导航文字：圆润、柔和、好看 */
        .nav a {
            text-decoration: none;
            font-size: 17px;
            color: #333;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px; /* 核心：圆角圆润 */
            transition: 0.3s;
        }

        /* 鼠标悬浮效果 */
        .nav a:hover {
            color: #fff;
            background-color: #C91F37;
        }

        /* 内容区 */
        .content {
            padding: 30px;
        }
    </style>
</head>
<body>

<!-- 顶部全红条：党徽 + 白色标题 -->
<div class="top-bar">
    <div class="party-logo">☭</div>
    <div class="site-title">中国共产主义青年交流会</div>
</div>

<!-- 导航菜单（已圆润） -->
<div class="nav">
    <a href="#">主页</a>
    <a href="#">国际共运</a>
    <a href="#">文章</a>
    <a href="#">历史</a>
    <a href="#">文艺</a>
    <a href="#">其他</a>
</div>

<!-- 内容区 -->
<div class="content">
    这里以后放页面内容
</div>

</body>
</html>
